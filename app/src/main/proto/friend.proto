syntax = "proto3";

package yh_friend;

option java_package = "com.juhao.murexide.proto.friend";
option java_outer_classname = "FriendProto";
option java_multiple_files = true;

// 响应状态
message Status {
  int64 number = 1;
  int32 code = 2;
  string msg = 3;
}

// 对象请求列表
message request_list {
  Status status = 1;

  message Request {
    string receiverName = 1;
    string receiverAvatar = 2;
    string name = 3;
    string avatar = 4;
    string groupName = 5;
    string groupAvatar = 6;
    string inviterId = 7;
    int32 sourceType = 9;
    int32 targetType = 10;
    string targetId = 11;
    string receiverId = 12;
    int32 result = 13;
    int64 processedAt = 14;
    int64 inviteAt = 16;
    string inviteAtStr = 17;
    int32 requestId = 18;
    string botName = 19;
    string botAvatar = 20;
    string processorName = 22;
    string note = 23;
  }

  repeated Request requests = 2;
  int32 total = 3;
  int32 pending = 4;
}

// 请求通讯录列表
message address_book_list_send {
  string md5 = 2;
}

// 通讯录列表响应
message address_book_list {
  Status status = 1;
  repeated Data data = 2;
  string md5 = 3;

  // 列表数据
  message Data {
    string list_name = 1; // 聊天对象列表名称，为"用户"，"我加入的群聊"，"机器人"
    repeated Data_list data = 2;
    int32 chat_type = 3;

    // 聊天对象数据
    message Data_list {
      string chat_id = 1; // 聊天对象ID
      string remark = 2; // 聊天对象备注名称
      string avatar_url = 3; // 聊天对象头像url
      int32 permisson_level = 4; // 群权限等级(普通用户无此项(数值为0或无此项),群主100,管理员2),只有群列表才有此项
      bool noDisturb = 5; // 免打扰
      string name = 8; // 聊天对象真实名称
    }
  }
}
